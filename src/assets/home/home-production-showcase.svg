<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">Ecommerce image generation showcase</title>
  <desc id="desc">A polished ecommerce image studio showcase combining a product main image, a white background cutout and apparel detail page modules.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".55" stop-color="#f6f7f4"/>
      <stop offset="1" stop-color="#e9eee8"/>
    </linearGradient>
    <linearGradient id="sage" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edf5ef"/>
      <stop offset="1" stop-color="#cad9d1"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f8f8"/>
      <stop offset=".52" stop-color="#cdd3d5"/>
      <stop offset="1" stop-color="#8f999f"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2a2f35"/>
      <stop offset="1" stop-color="#0d1116"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#111827" flood-opacity=".17"/>
    </filter>
    <filter id="tightShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#111827" flood-opacity=".15"/>
    </filter>
  </defs>


services:
  - type: web
    name: kroma-web-api
    runtime: node
    branch: main
    rootDir: web-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: WEB_SUPABASE_URL
        sync: false
      - key: WEB_SUPABASE_ANON_KEY
        sync: false
      - key: WEB_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: WEB_AUTH_REDIRECT_URL
        value: https://kromaai.app
      - key: WEB_ALLOWED_AUTH_REDIRECTS
        value: https://kromaai.app,https://www.kromaai.app,https://kroma-web.onrender.com
      - key: WEB_AUTH_EMAIL_FROM
        value: kroma <no-reply@i18.pro>
      - key: WEB_RESEND_API_KEY
        sync: false
      - key: WEB_AUTH_CODE_SECRET
        sync: false
      - key: WEB_INTERNAL_BILLING_KEY
        sync: false
      - key: WEB_PADDLE_WEBHOOK_SECRET
        sync: false
      - key: WEB_PADDLE_PRICE_CREDITS_JSON
        value: '{"pri_01kvq85dsggpt3qcb5pk02s10a":{"credits":120,"plan_id":"basic-top-up","plan_name":"基础包"},"pri_01kvq89wc6w551q949arne6xvt":{"credits":420,"plan_id":"standard-top-up","plan_name":"标准包"},"pri_01kvq8cmj8xb0412zr80hracsp":{"credits":950,"plan_id":"pro-top-up","plan_name":"专业包"},"pri_01kvq8dppzzfbrbb5yqf15x7se":{"credits":260,"plan_id":"monthly-subscription","plan_name":"轻度创作首选"},"pri_01kvq8g8wwx973evrvc2dgcfad":{"credits":840,"plan_id":"quarterly-subscription","plan_name":"稳定创作更划算"},"pri_01kvq8f3masyt9nfcgs9zscrq5":{"credits":3500,"plan_id":"yearly-subscription","plan_name":"最高优惠"}}'
      - key: WEB_IMAGE_API_BASE_URL
        sync: false
      - key: WEB_IMAGE_API_KEY
        sync: false

  - type: web
    name: kroma-web
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: ""
      - key: VITE_WEB_API_BASE_URL
        value: https://kroma-web-api.onrender.com/api/v1
      - key: VITE_KROMA_API_BASE_URL
        value: https://kroma-web-api.onrender.com/api/v1
      - key: VITE_PADDLE_ENVIRONMENT
        value: production
      - key: VITE_PADDLE_CLIENT_TOKEN
        sync: false
      - key: VITE_PADDLE_PRICE_BASIC_TOP_UP
        value: pri_01kvq85dsggpt3qcb5pk02s10a
      - key: VITE_PADDLE_PRICE_STANDARD_TOP_UP
        value: pri_01kvq89wc6w551q949arne6xvt
      - key: VITE_PADDLE_PRICE_PRO_TOP_UP
        value: pri_01kvq8cmj8xb0412zr80hracsp
      - key: VITE_PADDLE_PRICE_MONTHLY_SUBSCRIPTION
        value: pri_01kvq8dppzzfbrbb5yqf15x7se
      - key: VITE_PADDLE_PRICE_QUARTERLY_SUBSCRIPTION
        value: pri_01kvq8g8wwx973evrvc2dgcfad
      - key: VITE_PADDLE_PRICE_YEARLY_SUBSCRIPTION
        value: pri_01kvq8f3masyt9nfcgs9zscrq5
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

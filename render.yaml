services:
  - type: web
    name: kroma-web
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_KROMA_API_BASE_URL
        value: https://kroma-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
